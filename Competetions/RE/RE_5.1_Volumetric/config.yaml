id: RE_5.1
domain: RE
title: Volumetric Reserves Estimation
description: >
  Компетенция по подсчету геологических и извлекаемых запасов нефти
  объемным методом. Покрывает базовые принципы классификации запасов и
  месторождений, а также расчет по площади, эффективной толщине, NTG,
  пористости, нефтенасыщенности, объемному коэффициенту, плотности нефти
  и коэффициенту извлечения.
